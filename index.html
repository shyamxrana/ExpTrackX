 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />  
    <title>ExpTrackx</title>
</head>
<body>
    <div class="app-wrapper">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>💰 ExpTrackx</h1>
                <p class="header-date" id="current-date"></p>
            </div>
        </header>

        <!-- Main Container -->
        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-content">
                    <!-- Summary Cards -->
                    <div class="summary-section">
                        <div class="period-tabs">
                            <button class="period-btn active" data-period="today">Today</button>
                            <button class="period-btn" data-period="month">Month</button>
                            <button class="period-btn" data-period="total">Total</button>
                        </div>
                        <div class="summary-card total-card animate-in">
                            <div class="summary-label">Balance</div>
                            <div class="summary-amount" id="total-amount">₹0</div>
                            <div class="amount-change" id="amount-change"></div>
                        </div>
                        <div class="stat-cards">
                            <div class="stat-mini">
                                <div class="stat-icon">📊</div>
                                <div class="stat-info">
                                    <div class="stat-label">Avg Expense</div>
                                    <div class="stat-value" id="avg-amount">₹0</div>
                                </div>
                            </div>
                            <div class="stat-mini">
                                <div class="stat-icon">🎯</div>
                                <div class="stat-info">
                                    <div class="stat-label">Count</div>
                                    <div class="stat-value" id="count-amount">0</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Category Breakdown -->
                    <div class="category-breakdown">
                        <h3>Spending by Category</h3>
                        <div id="category-list" class="category-list"></div>
                        <div class="chart-container" id="chart-container"></div>
                    </div>
                </div>
            </aside>

            <!-- Content Area -->
            <section class="content">
                <!-- Add Expense Form -->
                <div class="form-section">
                    <h2>Add New Expense</h2>
                    <form id="expense-form" class="expense-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category" required>
                                    <option value="">Select Category</option>
                                    <option value="Food">🍔 Food</option>
                                    <option value="Travel">🚗 Travel</option>
                                    <option value="Shopping">🛍️ Shopping</option>
                                    <option value="Entertainment">🎬 Entertainment</option>
                                    <option value="Healthcare">🏥 Healthcare</option>
                                    <option value="Utilities">💡 Utilities</option>
                                    <option value="Other">🔖 Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="amount">Amount (₹)</label>
                                <input type="number" id="amount" placeholder="0.00" step="0.01" required />
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <label for="description">Description</label>
                            <input type="text" id="description" placeholder="Enter expense description" required />
                        </div>
                        <div class="form-group full-width">
                            <label for="date">Date</label>
                            <input type="date" id="date" required />
                        </div>
                        <button type="submit" class="btn-primary">+ Add Expense</button>
                    </form>
                </div>

                <!-- Filter and Controls -->
                <div class="controls-section">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="🔍 Search expenses..." />
                    </div>
                    <div class="filter-controls">
                        <select id="filter-category" class="filter-select">
                            <option value="">All Categories</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Travel">🚗 Travel</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Healthcare">🏥 Healthcare</option>
                            <option value="Utilities">💡 Utilities</option>
                            <option value="Other">🔖 Other</option>
                        </select>
                        <button id="export-btn" class="btn-secondary">📥 Export</button>
                        <button id="clear-btn" class="btn-danger">🗑️ Clear All</button>
                    </div>
                </div>

                <!-- Expenses List -->
                <div class="expenses-section">
                    <h2>Recent Expenses</h2>
                    <div class="expense-list" id="expense-list">
                        <div class="empty-state">
                            <p>📭 No expenses yet. Add one to get started!</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
